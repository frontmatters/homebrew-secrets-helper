name: Sync formula

# Keeps Formula/secrets-helper.rb in sync with the latest secrets-helper release.
#
# Triggers, fastest to slowest:
#   - repository_dispatch: fired instantly by the secrets-helper repo on release
#     (needs the TAP_DISPATCH_TOKEN secret over there — see README).
#   - workflow_dispatch:   manual run, optionally pinned to a version.
#   - schedule:            daily safety net so it self-heals even without the PAT.

on:
  repository_dispatch:
    types: [secrets-helper-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (blank = latest release)"
        required: false
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula
        env:
          # Untrusted inputs go through env vars, never inline ${{ }} in run:.
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          ./scripts/bump.sh "${INPUT_VERSION:-$PAYLOAD_VERSION}"

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- Formula/secrets-helper.rb; then
            echo "Formula already up to date — nothing to do."
            exit 0
          fi
          v="$(grep -m1 -E '^  version ' Formula/secrets-helper.rb | sed -E 's/.*"([^"]+)".*/\1/')"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/secrets-helper.rb
          git commit -m "Bump secrets-helper to ${v}"
          git push
